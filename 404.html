<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Page Not Found | GEM Equipment Rental</title>
<meta name="robots" content="noindex">
<link rel="shortcut icon" href="/assets/gem-logo-box.png" type="image/png">
<meta name="theme-color" content="#15120f">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{--gem-orange:#eb8a35; --gem-burnt:#e86630; --ink:#1a1a1a; --ink-3:#6b655f; --line:#e4ded5; --paper:#ffffff; --paper-warm:#faf7f2; --radius:3px; --font:'Archivo', system-ui, sans-serif;}
*{box-sizing:border-box;}
body{margin:0; font-family:var(--font); color:var(--ink); background:var(--paper-warm); -webkit-font-smoothing:antialiased; min-height:100vh; display:flex; align-items:center; justify-content:center; padding:24px;}
a{color:inherit; text-decoration:none;}
a:hover{color:var(--gem-burnt);}
.card{max-width:560px; width:100%; background:var(--paper); border:1px solid var(--line); border-radius:var(--radius); padding:56px 48px; text-align:center;}
.card img{height:56px; width:auto; margin:0 auto 26px; display:block;}
.eyebrow{font-weight:700; font-size:.72rem; letter-spacing:.24em; text-transform:uppercase; color:var(--gem-burnt); margin:0 0 14px; display:inline-flex; align-items:center; gap:.7em;}
.eyebrow .dia{width:.5em; height:.5em; background:var(--gem-orange); transform:rotate(45deg); border-radius:8%;}
h1{font-weight:800; letter-spacing:-.02em; text-transform:uppercase; font-size:2rem; margin:0 0 12px; line-height:1;}
p{color:var(--ink-3); margin:0 0 28px; line-height:1.55;}
.btn{font-weight:700; font-size:.78rem; letter-spacing:.05em; text-transform:uppercase; display:inline-flex; align-items:center; gap:.6em; padding:1.05em 1.7em; border-radius:var(--radius); background:var(--gem-orange); color:var(--ink); transition:background .2s, color .2s;}
.btn:hover{background:var(--gem-burnt); color:#fff;}
.alt{display:block; margin-top:18px; font-weight:600; font-size:.86rem;}
</style>
</head>
<body>
<main class="card">
  <img decoding="async" src="/assets/gem-logo-box.png" alt="GEM Equipment Rental">
  <p class="eyebrow"><span class="dia"></span> Error 404</p>
  <h1>Page not found</h1>
  <p>The page you are looking for has moved or no longer exists. Our full equipment range is one click away.</p>
  <a class="btn" href="/">Back to Homepage</a>
  <a class="alt" href="tel:+971523868659">Or call us on +971 52 386 8659</a>
</main>
</body>
</html>
